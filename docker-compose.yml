version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: collab-force-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: collabforce
      POSTGRES_PASSWORD: collabforce_dev
      POSTGRES_DB: collabforce
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
